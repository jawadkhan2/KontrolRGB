<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b1e26"/>
      <stop offset="1" stop-color="#0c0e12"/>
    </linearGradient>
  </defs>

  <!-- app-panel rounded square background -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <rect x="8" y="8" width="1008" height="1008" rx="216" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>

  <!-- brandmark: 6 RGB nodes around a hub (matches title-bar logomark) -->
