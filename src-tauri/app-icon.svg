    <circle cx="16" cy="5.5"  r="2.6" fill="#ff5a4d"/>
    <circle cx="25.1" cy="10.75" r="2.6" fill="#fbbf24"/>
    <circle cx="25.1" cy="21.25" r="2.6" fill="#84cc16"/>
    <circle cx="16" cy="26.5" r="2.6" fill="#22d3ee"/>
    <circle cx="6.9" cy="21.25" r="2.6" fill="#5b8cff"/>
    <circle cx="6.9" cy="10.75" r="2.6" fill="#a855f7"/>
    <circle cx="16" cy="16" r="5.4" fill="none" stroke="#5a6170" stroke-width="1.5"/>
    <circle cx="16" cy="16" r="2.3" fill="#e7e9ee"/>
  </g>
</svg>
